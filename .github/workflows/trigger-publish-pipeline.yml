# 手動でブログ公開パイプラインを叩く例（GitHub Actions の secrets に合わせて設定）
name: Trigger publish pipeline
on:
  workflow_dispatch:
    inputs:
      brand:
        description: tarnar or izu_music_fund
        required: true
        default: tarnar
      title:
        description: Article title
        required: true
      url:
        description: Canonical article URL
        required: true
      summary:
        description: Short summary
        required: false
        default: ""

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: POST blog-publish-hook
        env:
          HOOK_BASE: ${{ secrets.NETLIFY_SITE_URL }}
          OPS_PUBLISH_SECRET: ${{ secrets.OPS_PUBLISH_SECRET }}
          BRAND: ${{ github.event.inputs.brand }}
          TITLE: ${{ github.event.inputs.title }}
          URL: ${{ github.event.inputs.url }}
          SUMMARY: ${{ github.event.inputs.summary }}
        run: |
          set -euo pipefail
          test -n "${HOOK_BASE:-}"
          test -n "${OPS_PUBLISH_SECRET:-}"
          BODY="$(jq -n --arg brand "$BRAND" --arg title "$TITLE" --arg url "$URL" --arg summary "$SUMMARY" \
            '{brand:$brand, article:{title:$title, url:$url, summary:$summary}}')"
          curl -sS -X POST "${HOOK_BASE%/}/.netlify/functions/blog-publish-hook" \
            -H "Authorization: Bearer ${OPS_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
