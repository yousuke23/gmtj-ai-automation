name: KB and golden checks

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'kb/**'
      - 'eval/golden-questions.md'
      - 'eval/scoring-rubric.md'
      - 'docs/README.md'
      - 'marketing/**'
      - 'tour/**'
      - 'kb/sources.md'
      - 'scripts/verify-kb-templates.sh'
      - 'scripts/verify-golden-questions.sh'
      - '.github/workflows/kb-templates.yml'
  pull_request:
    paths:
      - 'kb/**'
      - 'eval/golden-questions.md'
      - 'eval/scoring-rubric.md'
      - 'docs/README.md'
      - 'marketing/**'
      - 'tour/**'
      - 'kb/sources.md'
      - 'scripts/verify-kb-templates.sh'
      - 'scripts/verify-golden-questions.sh'
      - '.github/workflows/kb-templates.yml'

jobs:
  verify-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify intent ↔ template files
        run: bash scripts/verify-kb-templates.sh
      - name: Verify golden question count
        run: bash scripts/verify-golden-questions.sh
