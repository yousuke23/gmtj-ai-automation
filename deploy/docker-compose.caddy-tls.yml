# Caddy — TLS 終端のみ（バックエンドはホストの 8080）
#
# 前提: Open WebUI または auth-stack の nginx がホストで 127.0.0.1:8080 を使用中
# 起動: cd deploy && docker compose -p gmtj-caddy -f docker-compose.caddy-tls.yml up -d
# URL:  https://127.0.0.1:8443

services:
  caddy-tls:
    image: caddy:2.8-alpine
    container_name: gmtj-caddy-tls
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:443"
    volumes:
      - ./caddy/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy-data:
  caddy-config:
