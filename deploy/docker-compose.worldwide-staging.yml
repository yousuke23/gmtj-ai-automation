# 全世界向け — Open WebUI + nginx Basic + Caddy（TLS / 80・443 公開）
#
# 想定: パブリック IP を持つ VPS。DNS の A/AAAA がこのサーバーを向いてから起動すること。
# 自宅 Mac で 0.0.0.0:80/443 を開けると危険なので、検証も VPS 上で行うことを推奨。
#
# 手順の全文: deploy/WORLDWIDE-STAGING.md
#
# 既存の docker-compose.yml / auth-stack / caddy-tls と同時起動しないこと（ポート競合）。

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.5.10
    container_name: gmtj-open-webui-www
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?set in .env}
    volumes:
      - open-webui-data-www:/app/backend/data
      - ../kb:/kb-ro:ro
    networks:
      - gmtj-www-net

  nginx-auth:
    image: nginx:1.27-alpine
    container_name: gmtj-nginx-www
    restart: unless-stopped
    depends_on:
      - open-webui
    expose:
      - "8080"
    volumes:
      - ./nginx/auth.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - gmtj-www-net

  caddy-www:
    image: caddy:2.8-alpine
    container_name: gmtj-caddy-www
    restart: unless-stopped
    depends_on:
      - nginx-auth
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    environment:
      - GMTJ_PUBLIC_DOMAIN=${GMTJ_PUBLIC_DOMAIN:?set in .env}
      - ACME_EMAIL=${ACME_EMAIL:?set in .env}
    volumes:
      - ./caddy/Caddyfile.worldwide:/etc/caddy/Caddyfile:ro
      - caddy-www-data:/data
      - caddy-www-config:/config
    networks:
      - gmtj-www-net

volumes:
  open-webui-data-www:
  caddy-www-data:
  caddy-www-config:

networks:
  gmtj-www-net:
    driver: bridge
