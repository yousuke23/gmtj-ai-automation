# Netlify: static site + serverless chat + SNS/LINE automation
[build]
  publish = "site"
  # TARNAR ブログ生成（1600×4言語）＋事業ポータル（各500本同期の manifest 同梱）
  command = "python3 scripts/build_tarnar_izu_blog_pages.py && python3 scripts/generate_business_portals.py && python3 scripts/inject_robots_meta.py && python3 scripts/inject_tarnar_payment_urls.py && python3 scripts/inject_gmtj_chrome.py"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# スタッフ専用パス（公開サイトからはリンクしない）。HTML の noindex に加え HTTP ヘッダでも明示。
[[headers]]
  for = "/gmtj-os/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/automation/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/social-templates/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# 環境変数例（Netlify UI でも設定）:
# OPS_PUBLISH_SECRET, AUTOMATION_BRIDGE_URL, SITE_CANONICAL_URL
# LINE_TARNAR_CHANNEL_SECRET, LINE_TARNAR_CHANNEL_TOKEN, LINE_TARNAR_NOTIFY_USER_ID
# LINE_IMF_CHANNEL_SECRET, LINE_IMF_CHANNEL_TOKEN, LINE_IMF_NOTIFY_USER_ID
# ANTHROPIC_API_KEY（チャット用）
# ANTHROPIC_MODEL（任意・未設定時 claude-haiku-4-5-20251001。旧 claude-3-5-haiku-20241022 は廃止済み）
# SITE_STRIPE_TARNAR_MONTHLY, SITE_PAYJP_TARNAR_MONTHLY（#08 月額の公開決済URL。未設定時は inject が mailto に差し替え）

