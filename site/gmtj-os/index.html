<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>GMTJ OS</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <header class="dash-header" role="banner">
    <a class="logo" href="#top">GMTJ OS</a>
    <nav class="dash-nav" aria-label="ナビ">
      <a href="#top">今日</a>
      <a href="#focus">重点</a>
      <a href="#biz21">21事業</a>
    </nav>
    <a class="link-external" href="../index.html">サイト</a>
  </header>

  <section id="top" class="hero-today hero-today--feature" aria-labelledby="today-title">
    <h1 id="today-title">今日の自動実行結果</h1>
    <p id="today-headline" class="today-headline" hidden></p>
    <div id="status-track" class="status-bar-track" role="img" aria-label="成功・要確認・実行中"></div>
    <div id="status-legend" class="status-legend"></div>
    <ul id="today-actions" class="today-actions" aria-label="今日やること"></ul>
  </section>

  <main class="wrap">
    <section id="focus" class="focus-section focus-row" aria-label="TARNAR と Izu Music Fund">
      <article id="tarnar" class="focus-card focus-card--hero focus-card--08"></article>
      <article id="izu" class="focus-card focus-card--hero focus-card--21"></article>
    </section>

    <section id="biz21" class="panel">
      <h2>21事業</h2>
      <div id="biz-grid" class="biz-grid" aria-live="polite"></div>
    </section>

    <section id="sales" class="panel panel--compact">
      <h2>売上ランキング</h2>
      <div id="sales-ranking" class="sales-ranking" aria-live="polite"></div>
    </section>
  </main>

  <script src="dashboard.js" defer></script>
</body>
</html>
